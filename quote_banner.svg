  <text x="62" y="88" font-family="Georgia, serif" font-size="48" fill="#38bdf8" opacity="0.3" font-weight="700" style="fill:rgb(56, 189, 248);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:0.3;font-family:Georgia, serif;font-size:48px;font-weight:700;text-anchor:start;dominant-baseline:auto">"</text>

